name: DevSecOps Pipeline with Artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  # JOB 1: Security Scan
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Semgrep SAST
        run: |
          docker run --rm -v "${PWD}:/src" returntocorp/semgrep semgrep scan --config auto --json --output semgrep-report.json || true
      
      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: "cyclonedx-json"
          output-file: "sbom-cdx.json"

      - name: Upload Security Reports & SBOM
        uses: actions/upload-artifact@v4
        with:
          name: scan-reports
          path: |
            semgrep-report.json
            sbom-cdx.json
          retention-days: 5

  # JOB 2: Build and Attest
    # JOB 2: Build and Attest
  build-and-attest:
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/cyberolympian/osana_security-app:latest

      - name: Generate Container SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/cyberolympian/osana_security-app:latest
          format: "cyclonedx-json"
          output-file: "container-sbom-cdx.json"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/cyberolympian/osana_security-app
          subject-digest: ${{ steps.build-image.outputs.digest }}
          push-to-registry: true

      - name: Upload Container Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: container-artifacts
          path: container-sbom-cdx.json
